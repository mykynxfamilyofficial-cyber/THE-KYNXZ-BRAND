<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4A84F"/>
      <stop offset="50%" stop-color="#E8C56A"/>
      <stop offset="100%" stop-color="#B8922E"/>
    </linearGradient>
    <linearGradient id="darkBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
  </defs>
  <!-- Diamond outline -->
  <polygon points="32,2 58,28 32,58 6,28" fill="url(#darkBg)" stroke="url(#goldGrad)" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Inner diamond -->
  <polygon points="32,10 50,28 32,46 14,28" fill="none" stroke="url(#goldGrad)" stroke-width="0.6" stroke-dasharray="2 3"/>
  <!-- K letter -->
  <text x="32" y="35" text-anchor="middle" fill="url(#goldGrad)" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="600" letter-spacing="-1">K</text>
</svg>
